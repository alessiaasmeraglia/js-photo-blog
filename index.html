<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Blog</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Edu+TAS+Beginner:wght@400;700&family=Sometype+Mono:wght@400&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <header class="site-header">
        <h1>ESTATE '24</h1>
    </header>

    <main class="site-main">
        <div class="site-container">

            <div id="photo-list" class="photo-grid">
                <!-- Le card vengono generate via JS -->
            </div>

            <section class="upload-section">
                <form id="photo-form" class="upload-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="photo-title">Titolo</label>
                            <input
                                type="text"
                                id="photo-title"
                                name="title"
                                placeholder="Inserisci il titolo"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="photo-date">Data</label>
                            <input
                                type="date"
                                id="photo-date"
                                name="date"
                                required
                            >
                        </div>

                        <div class="form-group">
                            <label for="photo-file">Immagine</label>
                            <input
                                type="file"
                                id="photo-file"
                                name="file"
                                accept="image/*"
                                required
                            >
                        </div>
                    </div>

                    <div class="thumbnail-preview">
                        <p id="thumbnail-placeholder" class="thumbnail-placeholder">Anteprima immagine</p>
                        <img id="thumbnail-image" src="" alt="Anteprima foto">
                    </div>

                    <button type="submit" class="upload-button">Aggiungi foto</button>
                </form>
            </section>

        </div>
    </main>

    <div id="photo-modal" class="photo-modal hidden">
        <button id="modal-close" class="modal-close" aria-label="Chiudi modale">&times;</button>
        <div class="modal-content">
            <img id="modal-image" src="" alt="Foto ingrandita">
        </div>
    </div>

    <footer class="site-footer">
        <p>&copy; 2024 Photo Blog. Tutti i diritti riservati.</p>
    </footer>

    <script src="./js/script.js"></script>
</body>
</html>
